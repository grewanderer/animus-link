name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  path-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: reject NTFS ADS artifact paths
        run: |
          ads_paths="$(rg --files | awk '/:Zone.Identifier$/')"
          if [ -n "${ads_paths}" ]; then
            echo "Found forbidden ADS-like paths:"
            echo "${ads_paths}"
            exit 1
          fi

  desktop-artifacts:
    needs: path-sanity
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            exe_suffix: ""
          - os: macos-latest
            target: macos-arm64
            exe_suffix: ""
          - os: windows-latest
            target: windows-x86_64
            exe_suffix: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check
      - name: clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: build desktop binaries
        run: cargo build --release -p relay-server -p link-daemon -p link-cli -p fabric-cli -p conformance-runner
      - name: collect desktop artifacts
        shell: bash
        run: |
          mkdir -p release/${{ matrix.target }}
          for bin in relay-server link-daemon link-cli fabric-cli conformance-runner; do
            cp "target/release/${bin}${{ matrix.exe_suffix }}" "release/${{ matrix.target }}/${bin}${{ matrix.exe_suffix }}"
          done
      - name: upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: release/${{ matrix.target }}

  android-artifact:
    runs-on: ubuntu-latest
    needs: path-sanity
    steps:
      - uses: actions/checkout@v4
      - name: enforce signed relay tokens in demo script
        run: |
          grep -F -- '--token-issuer-pubkey-hex' scripts/demo-relay-first-e2e.sh
          if grep -F -- '--dev-allow-unsigned-tokens' scripts/demo-relay-first-e2e.sh; then
            echo "unsigned relay token flag must not be used in demo script"
            exit 1
          fi
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-linux-android,x86_64-linux-android
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: install cargo-ndk
        run: cargo install cargo-ndk --locked
      - name: build rust android ffi
        run: bash mobile/android/scripts/build-rust-android.sh
      - name: verify android ffi artifacts
        run: |
          test -f mobile/android/app/src/main/jniLibs/arm64-v8a/libfabric_ffi.so
          test -f mobile/android/app/src/main/jniLibs/x86_64/libfabric_ffi.so
          test -f mobile/android/app/src/main/kotlin/com/animus/link/bindings/animus_link.kt
      - name: verify android vpn service wiring
        run: |
          rg -n "AnimusVpnService" mobile/android/app/src/main/AndroidManifest.xml
          rg -n "android.net.VpnService" mobile/android/app/src/main/AndroidManifest.xml
      - uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: mobile/android
          arguments: testDebugUnitTest assembleDebug
      - name: verify android apk
        run: test -f mobile/android/app/build/outputs/apk/debug/app-debug.apk
      - name: package android rust shared libraries
        run: |
          cd mobile/android/app/src/main/jniLibs
          zip -q -r ../../../../android-rust-libs.zip arm64-v8a x86_64
      - name: upload android apk
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
      - name: upload android rust shared libraries
        uses: actions/upload-artifact@v4
        with:
          name: android-rust-libs
          path: mobile/android/android-rust-libs.zip

  ios-artifact:
    runs-on: macos-latest
    needs: path-sanity
    steps:
      - uses: actions/checkout@v4
      - name: enforce signed relay tokens in demo script
        run: |
          grep -F -- '--token-issuer-pubkey-hex' scripts/demo-relay-first-e2e.sh
          if grep -F -- '--dev-allow-unsigned-tokens' scripts/demo-relay-first-e2e.sh; then
            echo "unsigned relay token flag must not be used in demo script"
            exit 1
          fi
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-apple-ios,aarch64-apple-ios-sim
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace
      - name: verify committed swift bindings are up-to-date
        run: |
          if [ -f mobile/ios/Generated/animus_link.swift ]; then
            cargo run --quiet -p fabric-ffi --bin generate-bindings -- swift mobile/ios/Generated
            git diff --exit-code -- mobile/ios/Generated/animus_link.swift
          fi
      - name: xcode build
        run: |
          xcodebuild \
            -project mobile/ios/AnimusLinkIOS.xcodeproj \
            -target AnimusLinkIOS \
            -target AnimusLinkTunnelExtension \
            -configuration Debug \
            -destination generic/platform=iOS \
            -derivedDataPath mobile/ios/build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build
      - name: package ios xcframework
        run: bash mobile/ios/scripts/package-xcframework.sh
      - name: package ios ipa (unsigned)
        run: bash mobile/ios/scripts/package-ipa.sh
      - name: verify ios ffi artifacts
        run: |
          test -f mobile/ios/Generated/animus_link.swift
          test -f mobile/ios/Generated/animus_linkFFI.h
          test -f mobile/ios/Generated/animus_linkFFI.modulemap
          test -f mobile/ios/RustLibs/iphoneos/libfabric_ffi.a
          test -d mobile/ios/dist/AnimusLinkFFI.xcframework
          test -d mobile/ios/build/Build/Products/Debug-iphoneos/AnimusLinkTunnelExtension.appex
          test -f mobile/ios/build/Build/Products/Debug-iphoneos/AnimusLinkIOS-debug.ipa
      - name: archive ios app
        run: |
          cd mobile/ios/build/Build/Products/Debug-iphoneos
          zip -r AnimusLinkIOS-debug-iphoneos.zip AnimusLinkIOS.app
      - name: archive ios xcframework
        run: |
          cd mobile/ios/dist
          zip -r AnimusLinkFFI.xcframework.zip AnimusLinkFFI.xcframework
      - name: upload ios ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: mobile/ios/build/Build/Products/Debug-iphoneos/AnimusLinkIOS-debug.ipa
      - name: upload ios artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: mobile/ios/build/Build/Products/Debug-iphoneos/AnimusLinkIOS-debug-iphoneos.zip
      - name: upload ios xcframework artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-xcframework
          path: mobile/ios/dist/AnimusLinkFFI.xcframework.zip

  publish-release:
    needs:
      - path-sanity
      - desktop-artifacts
      - android-artifact
      - ios-artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: install cargo-cyclonedx (pinned)
        run: cargo install cargo-cyclonedx --version 0.5.7 --locked
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: list collected artifacts
        run: ls -R release-artifacts
      - name: package release files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          for dir in release-artifacts/desktop-*; do
            base="$(basename "$dir")"
            tar -czf "dist/${base}.tar.gz" -C "$dir" .
          done
          cp release-artifacts/android-apk/app-debug.apk dist/animus-link-android-debug.apk
          cp release-artifacts/android-rust-libs/android-rust-libs.zip dist/android-rust-libs.zip
          cp release-artifacts/ios-ipa/AnimusLinkIOS-debug.ipa dist/AnimusLinkIOS-debug.ipa
          cp release-artifacts/ios-build/AnimusLinkIOS-debug-iphoneos.zip dist/AnimusLinkIOS-debug-iphoneos.zip
          cp release-artifacts/ios-xcframework/AnimusLinkFFI.xcframework.zip dist/AnimusLinkFFI.xcframework.zip
      - name: generate SBOM (CycloneDX)
        shell: bash
        run: |
          set -euo pipefail
          cargo cyclonedx --all --format json --output-file dist/sbom.cdx.json
      - name: generate SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          (
            cd dist
            sha256sum *.tar.gz *.apk *.zip *.ipa sbom.cdx.json > SHA256SUMS.txt
          )
      - name: verify release integrity artifacts
        shell: bash
        run: |
          set -euo pipefail
          test -f dist/SHA256SUMS.txt
          test -f dist/sbom.cdx.json
      - name: run release artifact verification script
        shell: bash
        run: bash scripts/verify-release-artifacts.sh dist
      - name: publish github release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
