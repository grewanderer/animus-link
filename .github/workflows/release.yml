name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  desktop-bundles:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target_triple: x86_64-unknown-linux-gnu
            platform_config: src-tauri/tauri.linux.conf.json
          - os: windows-latest
            target_triple: x86_64-pc-windows-msvc
            platform_config: src-tauri/tauri.windows.conf.json
          - os: macos-latest
            target_triple: aarch64-apple-darwin
            platform_config: src-tauri/tauri.macos.conf.json
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/link-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: Swatinem/rust-cache@v2
      - name: cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: release-desktop-${{ runner.os }}-${{ hashFiles('apps/link-desktop/package.json') }}
          restore-keys: |
            release-desktop-${{ runner.os }}-
      - name: linux desktop deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: install dependencies
        run: npm install --no-fund --no-audit
      - name: generate icons
        run: npm exec tauri icon src/assets/app-icon.svg
      - name: import Apple signing certificate
        if: runner.os == 'macOS' && secrets.APPLE_CERTIFICATE_P12_BASE64 != ''
        run: |
          echo "${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}" | base64 --decode > /tmp/animus-signing-cert.p12
      - name: import Windows signing certificate
        if: runner.os == 'Windows' && secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != ''
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\\animus-signing-cert.pfx", [Convert]::FromBase64String("${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}"))
      - name: build daemon sidecar
        working-directory: .
        run: cargo build --release -p link-daemon
      - name: prepare bundled sidecar
        working-directory: .
        shell: bash
        run: bash scripts/prepare-desktop-sidecar.sh ${{ matrix.target_triple }} release
      - name: build signed or preview bundle
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE_PFX_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PFX_PASSWORD }}
        run: |
          CONFIG_ARGS="--config src-tauri/tauri.conf.json --config ${{ matrix.platform_config }}"
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            CONFIG_ARGS="${CONFIG_ARGS} --config src-tauri/tauri.release.conf.json"
          fi
          npm run tauri:build -- ${CONFIG_ARGS}
      - name: upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target_triple }}
          path: apps/link-desktop/src-tauri/target/release/bundle

  publish-release:
    needs: desktop-bundles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
      - name: create release metadata
        run: |
          mkdir -p release-out
          find release-artifacts -type f -exec cp {} release-out/ \;
          (
            cd release-out
            sha256sum * > SHA256SUMS.txt
          )
          cat > release-out/release-metadata.json <<'JSON'
          {
            "draft": true,
            "operator_friendly_name": "Animus Link Desktop",
            "signing_ready": "${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}",
            "updater_ready": "${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' }}",
            "notes": "Unsigned preview artifacts are published when signing secrets are absent."
          }
          JSON
      - name: publish draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release-out/*
