name: ci

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  workspace:
    name: workspace-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: linux desktop deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: fmt
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --all -- --check
      - name: clippy
        if: matrix.os == 'ubuntu-latest'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: build
        run: cargo build --workspace
      - name: test
        run: cargo test --workspace
      - name: conformance
        if: matrix.os == 'ubuntu-latest'
        run: cargo run -p conformance-runner -- --run all

  desktop-frontend:
    name: desktop-frontend-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/link-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('apps/link-desktop/package.json') }}
          restore-keys: |
            npm-${{ runner.os }}-
      - name: install dependencies
        run: npm install --no-fund --no-audit
      - name: lint
        run: npm run lint
      - name: test
        run: npm run test:run
      - name: build
        run: npm run build
      - name: upload frontend build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-frontend-${{ matrix.os }}
          path: apps/link-desktop/dist

  desktop-smoke:
    name: desktop-smoke-${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_triple: x86_64-unknown-linux-gnu
          - os: macos-latest
            target_triple: aarch64-apple-darwin
          - os: windows-latest
            target_triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/link-desktop
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-smoke-${{ runner.os }}-${{ hashFiles('apps/link-desktop/package.json') }}
          restore-keys: |
            npm-smoke-${{ runner.os }}-
      - name: linux desktop deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev
      - name: install dependencies
        run: npm install --no-fund --no-audit
      - name: generate icons
        run: npm exec tauri icon src/assets/app-icon.svg
      - name: build daemon sidecar
        working-directory: .
        run: cargo build -p link-daemon
      - name: prepare dev sidecar
        working-directory: .
        shell: bash
        run: bash scripts/prepare-desktop-sidecar.sh ${{ matrix.target_triple }} debug
      - name: tauri rust smoke
        working-directory: .
        run: cargo test --manifest-path apps/link-desktop/src-tauri/Cargo.toml
